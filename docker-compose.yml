services:
  db:
    image: postgres:16-alpine
    container_name: SecurePulse-DB
    networks:
      - securepulse-net
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Kathmandu
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: SecurePulse
    networks:
      - securepulse-net
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@SecurePulse-DB:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      TZ: Asia/Kathmandu
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: SecurePulse-Nginx
    networks:
      - securepulse-net
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped

networks:
  securepulse-net:
    driver: bridge

volumes:
  db_data:
